apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrogemini
  labels:
    app: retrogemini
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: retrogemini
  template:
    metadata:
      labels:
        app: retrogemini
    spec:
      containers:
        - name: container
          image: jpfroud/retrogemini:10.2
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: SUPER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: retrogemini-super-admin
                  key: SUPER_ADMIN_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: retrogemini-super-admin
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: retrogemini-super-admin
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: retrogemini-super-admin
                  key: POSTGRES_DB
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: retrogemini-super-admin
                  key: POSTGRES_HOST
            # SMTP configuration (optional - for email invitations and password reset)
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: retrogemini-smtp
                  key: SMTP_HOST
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: retrogemini-smtp
                  key: SMTP_PORT
                  optional: true
            - name: SMTP_SECURE
              valueFrom:
                secretKeyRef:
                  name: retrogemini-smtp
                  key: SMTP_SECURE
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: retrogemini-smtp
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: retrogemini-smtp
                  key: SMTP_PASS
                  optional: true
            - name: FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: retrogemini-smtp
                  key: FROM_EMAIL
                  optional: true
            # Wi-Fi QR code configuration (optional - for air-gapped deployments)
            - name: WIFI_SSID
              valueFrom:
                secretKeyRef:
                  name: retrogemini-wifi
                  key: WIFI_SSID
                  optional: true
            - name: WIFI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: retrogemini-wifi
                  key: WIFI_PASSWORD
                  optional: true
            # Feedback automation (optional - GitHub dispatch for feedback triage)
            - name: FEEDBACK_AUTOMATION_ENABLED
              value: "false"
            - name: FEEDBACK_AUTOMATION_EVENT_TYPE
              value: "feedback_hub_submission"
            - name: FEEDBACK_AUTOMATION_OFFLINE_MODE
              value: "true"
            - name: FEEDBACK_AUTOMATION_OUTBOX_PATH
              value: "/tmp/feedback-automation-outbox"
            - name: FEEDBACK_AUTOMATION_MIN_TITLE_LENGTH
              value: "8"
            - name: FEEDBACK_AUTOMATION_MIN_DESCRIPTION_LENGTH
              value: "40"
            - name: FEEDBACK_AUTOMATION_GITHUB_REPO
              valueFrom:
                secretKeyRef:
                  name: retrogemini-automation
                  key: FEEDBACK_AUTOMATION_GITHUB_REPO
                  optional: true
            - name: FEEDBACK_AUTOMATION_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: retrogemini-automation
                  key: FEEDBACK_AUTOMATION_GITHUB_TOKEN
                  optional: true
            # Backup configuration (plain values - safe to re-apply)
            - name: BACKUP_ENABLED
              value: "true"
            - name: BACKUP_INTERVAL_HOURS
              value: "24"
            - name: BACKUP_MAX_COUNT
              value: "7"
            - name: BACKUP_ON_STARTUP
              value: "true"
          resources:
            limits:
              memory: 384Mi
            requests:
              cpu: 1m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
              scheme: HTTP
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            timeoutSeconds: 1
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 30
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
