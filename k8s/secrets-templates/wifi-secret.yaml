apiVersion: v1
kind: Secret
metadata:
  name: retrogemini-wifi
  labels:
    app: retrogemini
type: Opaque
stringData:
  # Wi-Fi QR code configuration (optional)
  # When both values are set, a "WI-FI" tab appears in the invite modal
  # so participants can scan a QR code to connect to the local network.
  # Leave empty to disable the feature.
  WIFI_SSID: ""
  WIFI_PASSWORD: ""
