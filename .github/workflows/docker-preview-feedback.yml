name: Docker Preview (Feedback Branches)

on:
  push:
    branches:
      - 'feedback/**'

jobs:
  preview-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build preview tag parts
        id: meta
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          BRANCH_SLUG=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._/-]#-#g' | sed 's#/#-#g')
          SHORT_SHA=$(echo "$SHA" | cut -c1-8)
          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_REPOSITORY }}:preview-${{ steps.meta.outputs.branch_slug }}-${{ steps.meta.outputs.short_sha }}

      - name: Summary
        run: |
          echo "## Feedback Preview Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ secrets.DOCKERHUB_REPOSITORY }}:preview-${{ steps.meta.outputs.branch_slug }}-${{ steps.meta.outputs.short_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
